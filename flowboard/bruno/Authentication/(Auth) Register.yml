info:
  name: (Auth) Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "test@gmail.com",
        "password": "Testpassword!"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
