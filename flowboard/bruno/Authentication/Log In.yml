info:
  name: Log In
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "dev@flowboard.local",
        "password": "Password1!"
      }
  auth: inherit

script:
  res: |-
    const body = res.getBody();
    if (body && body.data && body.data.accessToken) {
      bru.setEnvVar("accessToken", body.data.accessToken);
      bru.setEnvVar("refreshToken", body.data.refreshToken);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
