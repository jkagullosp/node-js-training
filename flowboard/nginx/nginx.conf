events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 10k;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved after
    # container restarts/rebuilds instead of being cached at Nginx startup.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        # /api/* → strip the /api/ prefix and forward to the API
        # e.g. localhost/api/boards → api:3000/boards
        # Trailing slash in proxy_pass triggers nginx prefix-stripping.
        location /api/ {
            proxy_pass http://api:3000/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }

        # Catch-all: /health, /ready, and any direct access forward as-is
        location / {
            proxy_pass http://api:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }
    }
}
